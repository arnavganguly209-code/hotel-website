# Production deploy — Hostinger VPS ONLY
# Target: https://hotel.theglobalorbit.com (/var/www/hotel-website)
#
# Required secrets: VPS_HOST, VPS_USER, VPS_PORT, VPS_SSH_KEY

name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy hotel.theglobalorbit.com
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Verify GitHub Secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          missing=0
          for name in VPS_HOST VPS_USER VPS_PORT VPS_SSH_KEY; do
            if [ -z "${!name}" ]; then
              echo "MISSING SECRET: $name"
              missing=1
            else
              echo "OK: $name is set"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Add secrets: Repo → Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Deploy over SSH (Hostinger VPS)
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 40m
          request_pty: true
          script: |
            set -e

            echo "Deployment Started"
            echo "SSH user=$(id -un) home=$HOME pwd=$(pwd)"

            APP_DIR="/var/www/hotel-website"
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "ERROR: $APP_DIR is not a git repo. Run one-time bootstrap on the VPS."
              exit 1
            fi

            # Load git first from system paths (Ubuntu always has /usr/bin/git)
            export PATH="/usr/local/bin:/usr/bin:/bin:$HOME/.local/bin:$PATH"
            if ! command -v git >/dev/null 2>&1; then
              echo "ERROR: git not found"
              exit 127
            fi
            echo "OK: git -> $(command -v git)"

            cd "$APP_DIR"
            if [ ! -f .env ]; then
              echo "ERROR: .env missing in $APP_DIR"
              exit 1
            fi
            mkdir -p public/uploads

            echo "Latest Git Commit (before sync): $(git log -1 --pretty=format:'%h %s' 2>/dev/null || echo n/a)"
            echo "Syncing origin/main (fetch + reset — NOT pull)"
            git fetch origin
            git reset --hard origin/main
            mkdir -p public/uploads
            touch public/uploads/.gitkeep
            echo "Latest Git Commit (deploying): $(git log -1 --pretty=format:'%h %s')"

            # After sync, load Node/npm/pm2 for THIS SSH user (fixes exit 127)
            chmod +x scripts/vps-env.sh scripts/vps-deploy.sh
            # shellcheck disable=SC1091
            . "$APP_DIR/scripts/vps-env.sh"

            bash "$APP_DIR/scripts/vps-deploy.sh"
