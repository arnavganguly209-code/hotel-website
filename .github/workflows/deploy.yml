# Production deploy — Hostinger VPS ONLY
# Target: https://hotel.theglobalorbit.com (/var/www/hotel-website)
#
# Required secrets: VPS_HOST, VPS_USER, VPS_PORT, VPS_SSH_KEY

name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy hotel.theglobalorbit.com
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Verify GitHub Secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euxo pipefail
          missing=0
          for name in VPS_HOST VPS_USER VPS_PORT VPS_SSH_KEY; do
            if [ -z "${!name}" ]; then
              echo "MISSING SECRET: $name"
              missing=1
            else
              echo "OK: $name is set"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Add secrets: Repo → Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Deploy over SSH (Hostinger VPS)
        uses: appleboy/ssh-action@v1.2.2
        env:
          GITHUB_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 90s
          command_timeout: 40m
          request_pty: true
          envs: GITHUB_SHA
          script: |
            set -e
            APP_DIR="/var/www/hotel-website"
            cd "$APP_DIR" || exit 1

            mkdir -p public/uploads/general
            BEACON="public/uploads/general/deploy-beacon.txt"
            echo "beacon $(date -u +%Y-%m-%dT%H:%M:%SZ) sha=${GITHUB_SHA:-none} user=$(id -un) pwd=$(pwd)" > "$BEACON"
            chmod ug+rw "$BEACON" || true

            if [ ! -d .git ]; then
              echo "ERROR: not a git repo" > "$BEACON"
              exit 1
            fi
            if [ ! -f .env ]; then
              echo "ERROR: .env missing" > "$BEACON"
              exit 1
            fi

            export PATH="/usr/local/bin:/usr/bin:/bin:${HOME}/.local/bin:${PATH:-}"

            cp -a .env "/tmp/htp-env-preserve"
            echo "env-preserved" >> "$BEACON"

            git fetch origin
            echo "fetch-ok" >> "$BEACON"

            git reset --hard origin/main
            echo "reset-ok HEAD=$(git rev-parse --short HEAD)" >> "$BEACON"

            # Re-create beacon after reset (reset may wipe untracked? keep uploads)
            mkdir -p public/uploads/general
            echo "post-reset $(date -u +%Y-%m-%dT%H:%M:%SZ) HEAD=$(git rev-parse --short HEAD)" > "$BEACON"

            cp -a /tmp/htp-env-preserve .env
            chmod 600 .env || true
            rm -f /tmp/htp-env-preserve
            echo "env-restored" >> "$BEACON"

            touch public/uploads/.gitkeep
            chmod -R ug+rwX public/uploads || true
            export UPLOADS_ROOT="$APP_DIR/public/uploads"

            chmod +x scripts/vps-env.sh scripts/vps-deploy.sh scripts/cutover-to-thamelpark.sh || true

            set +e
            # shellcheck disable=SC1091
            . "$APP_DIR/scripts/vps-env.sh"
            ENV_RC=$?
            set -e
            echo "vps-env-rc=$ENV_RC" >> "$BEACON"
            if [ "$ENV_RC" -ne 0 ]; then
              echo "ERROR: vps-env.sh failed" >> "$BEACON"
              exit 1
            fi

            export GITHUB_SHA
            set +e
            bash "$APP_DIR/scripts/vps-deploy.sh" > /tmp/htp-vps-deploy.log 2>&1
            DEPLOY_RC=$?
            set -e
            tail -n 80 /tmp/htp-vps-deploy.log >> "$BEACON" || true
            cp -f /tmp/htp-vps-deploy.log public/uploads/general/deploy-log.txt 2>/dev/null || true
            echo "deploy-rc=$DEPLOY_RC" >> "$BEACON"
            exit "$DEPLOY_RC"
