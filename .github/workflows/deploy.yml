# Production deploy — Hostinger VPS ONLY
# Target: https://hotel.theglobalorbit.com (/var/www/hotel-website)
#
# Required secrets: VPS_HOST, VPS_USER, VPS_PORT, VPS_SSH_KEY

name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy hotel.theglobalorbit.com
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Verify GitHub Secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euxo pipefail
          missing=0
          for name in VPS_HOST VPS_USER VPS_PORT VPS_SSH_KEY; do
            if [ -z "${!name}" ]; then
              echo "MISSING SECRET: $name"
              missing=1
            else
              echo "OK: $name is set"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Add secrets: Repo → Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Deploy over SSH (Hostinger VPS)
        uses: appleboy/ssh-action@v1.2.2
        env:
          GITHUB_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 90s
          command_timeout: 40m
          request_pty: true
          envs: GITHUB_SHA
          script: |
            set -e

            APP_DIR="/var/www/hotel-website"
            cd "$APP_DIR"

            mkdir -p public
            echo "beacon $(date -u +%Y-%m-%dT%H:%M:%SZ) sha=${GITHUB_SHA:-none} user=$(id -un)" > public/__deploy-beacon.txt

            if [ ! -d .git ]; then
              echo "ERROR: not a git repo" | tee public/__deploy-beacon.txt
              exit 1
            fi
            if [ ! -f .env ]; then
              echo "ERROR: .env missing" | tee public/__deploy-beacon.txt
              exit 1
            fi

            export PATH="/usr/local/bin:/usr/bin:/bin:${HOME}/.local/bin:${PATH:-}"

            cp -a .env "/tmp/htp-env-preserve"
            echo "env-preserved" >> public/__deploy-beacon.txt

            git fetch origin
            echo "fetch-ok" >> public/__deploy-beacon.txt

            git reset --hard origin/main
            echo "reset-ok HEAD=$(git rev-parse --short HEAD)" >> public/__deploy-beacon.txt

            cp -a /tmp/htp-env-preserve .env
            chmod 600 .env || true
            rm -f /tmp/htp-env-preserve
            echo "env-restored" >> public/__deploy-beacon.txt

            mkdir -p public/uploads
            touch public/uploads/.gitkeep
            chmod -R ug+rwX public/uploads || true
            export UPLOADS_ROOT="$APP_DIR/public/uploads"

            chmod +x scripts/vps-env.sh scripts/vps-deploy.sh scripts/cutover-to-thamelpark.sh || true

            set +e
            # shellcheck disable=SC1091
            . "$APP_DIR/scripts/vps-env.sh"
            ENV_RC=$?
            set -e
            echo "vps-env-rc=$ENV_RC" >> public/__deploy-beacon.txt
            if [ "$ENV_RC" -ne 0 ]; then
              echo "ERROR: vps-env.sh failed"
              exit 1
            fi

            export GITHUB_SHA
            bash "$APP_DIR/scripts/vps-deploy.sh"
            echo "deploy-script-ok" >> public/__deploy-beacon.txt
