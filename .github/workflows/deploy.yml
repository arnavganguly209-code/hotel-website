# Production deploy — Hostinger VPS ONLY
# Target: https://hotel.theglobalorbit.com  (/var/www/hotel-website)
# No Vercel. No Cloudflare Pages. No Render.
#
# Required secrets: VPS_HOST, VPS_USER, VPS_PORT, VPS_SSH_KEY

name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy hotel.theglobalorbit.com
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Verify GitHub Secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          missing=0
          for name in VPS_HOST VPS_USER VPS_PORT VPS_SSH_KEY; do
            if [ -z "${!name}" ]; then
              echo "MISSING SECRET: $name"
              missing=1
            else
              echo "OK: $name is set"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Add secrets: Repo → Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Deploy over SSH (Hostinger VPS)
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 40m
          script: |
            set -euo pipefail

            echo "Deployment Started"

            export PATH="/usr/local/bin:/usr/bin:$HOME/.local/bin:$PATH"
            if [ -s "$HOME/.nvm/nvm.sh" ]; then
              # shellcheck disable=SC1090
              . "$HOME/.nvm/nvm.sh"
            fi
            if [ -s "$HOME/.bashrc" ]; then
              # shellcheck disable=SC1090
              . "$HOME/.bashrc" >/dev/null 2>&1 || true
            fi

            command -v git >/dev/null
            command -v node >/dev/null
            command -v npm >/dev/null
            command -v pm2 >/dev/null
            command -v curl >/dev/null

            echo "Runtime: Node $(node -v) | npm $(npm -v) | PM2 $(pm2 -v)"

            APP_DIR="/var/www/hotel-website"
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "ERROR: $APP_DIR is not a git repo. Complete one-time VPS bootstrap."
              exit 1
            fi

            cd "$APP_DIR"

            if [ ! -f .env ]; then
              echo "ERROR: .env missing in $APP_DIR — refusing to deploy."
              exit 1
            fi
            mkdir -p public/uploads

            echo "Latest Git Commit (before sync): $(git log -1 --pretty=format:'%h %s' 2>/dev/null || echo 'n/a')"

            echo "Syncing origin/main (git fetch + reset — NOT git pull)"
            git fetch origin
            git reset --hard origin/main

            mkdir -p public/uploads
            touch public/uploads/.gitkeep

            echo "Latest Git Commit (deploying): $(git log -1 --pretty=format:'%h %s')"

            chmod +x scripts/vps-deploy.sh
            bash scripts/vps-deploy.sh
