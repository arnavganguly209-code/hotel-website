# Production deploy — Hostinger VPS ONLY
# Target: https://hotel.theglobalorbit.com (/var/www/hotel-website)
#
# Required secrets: VPS_HOST, VPS_USER, VPS_PORT, VPS_SSH_KEY
# retrigger logo deploy

name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy hotel.theglobalorbit.com
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Verify GitHub Secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euxo pipefail
          missing=0
          for name in VPS_HOST VPS_USER VPS_PORT VPS_SSH_KEY; do
            if [ -z "${!name}" ]; then
              echo "MISSING SECRET: $name"
              missing=1
            else
              echo "OK: $name is set"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Add secrets: Repo → Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Deploy over SSH (Hostinger VPS)
        uses: appleboy/ssh-action@v1.2.2
        env:
          GITHUB_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          # Dial timeout — default 30s caused flaky Hostinger connect failures
          timeout: 90s
          command_timeout: 40m
          request_pty: true
          envs: GITHUB_SHA
          script: |
            set -euxo pipefail

            echo "Deployment Started"
            echo "SSH user=$(id -un) HOME=$HOME"
            echo "GITHUB_SHA=${GITHUB_SHA:-}"

            APP_DIR="/var/www/hotel-website"
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "ERROR: $APP_DIR is not a git repo"
              exit 1
            fi

            export PATH="/usr/local/bin:/usr/bin:/bin:${HOME}/.local/bin:${PATH:-}"
            command -v git
            git --version

            cd "$APP_DIR"
            echo "pwd=$(pwd)"
            if [ ! -f .env ]; then
              echo "ERROR: .env missing in $APP_DIR"
              exit 1
            fi
            mkdir -p public/uploads/{culture,gallery,rooms,dining,spa,logo,payments,hero,seo,general}

            echo "git remote -v"
            git remote -v
            echo "Before sync HEAD=$(git rev-parse HEAD 2>/dev/null || echo n/a)"

            git fetch origin
            git reset --hard origin/main

            mkdir -p public/uploads/{culture,gallery,rooms,dining,spa,logo,payments,hero,seo,general}
            touch public/uploads/.gitkeep
            chmod -R ug+rwX public/uploads || true
            export UPLOADS_ROOT="$APP_DIR/public/uploads"
            echo "UPLOADS_ROOT=$UPLOADS_ROOT"

            echo "After sync HEAD=$(git rev-parse HEAD)"
            echo "git branch=$(git branch --show-current)"
            HEAD_SHA="$(git rev-parse HEAD)"
            if [ -n "${GITHUB_SHA:-}" ] && [ "$HEAD_SHA" != "$GITHUB_SHA" ]; then
              echo "WARN: HEAD $HEAD_SHA != GITHUB_SHA $GITHUB_SHA — continuing with origin/main"
            else
              echo "OK: HEAD matches expected SHA (or GITHUB_SHA unset)"
            fi

            # Early diagnostic file (served from public/) — survives even if later steps fail
            DB_HOST="$(grep -E '^DATABASE_URL=' .env 2>/dev/null | sed -E 's/.*@([^/:?]+).*/\1/' | head -1 || echo unknown)"
            IS_NEON=false
            echo "$DB_HOST" | grep -qi 'neon\.tech' && IS_NEON=true || true
            printf '{"updatedAt":"%s","message":"post-git-reset","databaseHost":"%s","isNeon":%s,"commit":"%s","githubSha":"%s"}\n' \
              "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              "$(printf '%s' "$DB_HOST" | tr '"\\' '  ')" \
              "$IS_NEON" \
              "$(git rev-parse --short HEAD)" \
              "$(printf '%s' "${GITHUB_SHA:-}" | cut -c1-12)" \
              > public/__db-migrate-status.json
            echo "Wrote early status: host=$DB_HOST neon=$IS_NEON"

            chmod +x scripts/vps-env.sh scripts/vps-deploy.sh scripts/migrate-neon-to-localhost.sh scripts/retry-neon-import.sh || true
            # shellcheck disable=SC1091
            . "$APP_DIR/scripts/vps-env.sh"

            export GITHUB_SHA
            bash "$APP_DIR/scripts/vps-deploy.sh"
